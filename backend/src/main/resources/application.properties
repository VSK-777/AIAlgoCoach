# =========================================================
# APPLICATION CONFIGURATION
# =========================================================

spring.application.name=AIAlgoCoach

server.port=${PORT:5000}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.forward-headers-strategy=framework
spring.threads.virtual.enabled=true

# =========================================================
# POSTGRESQL DATABASE CONFIGURATION (Neon)
# =========================================================

spring.datasource.url=${SPRING_DATASOURCE_URL}

spring.datasource.username=${DB_USERNAME}

spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.max-lifetime=900000

spring.datasource.properties.ssl=true
spring.datasource.properties.sslmode=require

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# =========================================================
# JPA / HIBERNATE CONFIGURATION
# =========================================================

spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# SPRING AI + GROQ CONFIGURATION
# =========================================================

spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai/v1

# Fallback Groq model if GROQ_MODEL is not set
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.1-8b-instant}
spring.ai.openai.client.timeout=30s
spring.http.client.connect-timeout=10s
spring.http.client.read-timeout=30s
# =========================================================
jwt.secret=${JWT_SECRET}

jwt.access-token-expiration=900000

jwt.refresh-token-expiration=604800000

# =========================================================
# LOGGING CONFIGURATION
# =========================================================

logging.level.org.springframework.security=WARN

logging.level.org.hibernate.SQL=WARN

# =========================================================
# JACKSON CONFIGURATION
# =========================================================

spring.jackson.serialization.indent-output=true

# =========================================================
# DEVTOOLS CONFIGURATION
# =========================================================

spring.devtools.restart.enabled=true

# =========================================================
# CORS / FRONTEND SUPPORT
# =========================================================

frontend.url=${FRONTEND_URL:http://localhost:5173}

# =========================================================
# SECURITY: REQUEST LIMITS
# =========================================================

server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================================
# OBSERVABILITY: ACTUATOR & MICROMETER
# =========================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=true

# =========================================================
# RESILIENCE4J CONFIGURATION
# =========================================================
resilience4j.circuitbreaker.instances.aiService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.aiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiService.waitDurationInOpenState=10s
resilience4j.retry.instances.aiService.maxAttempts=3
resilience4j.retry.instances.aiService.waitDuration=2s
