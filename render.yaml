services:
  # Backend Web Service (Docker)
  - type: web
    name: aialgocoach-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this in the Render dashboard to your remote MySQL instance
      - key: DB_USERNAME
        sync: false # Set this in the Render dashboard
      - key: DB_PASSWORD
        sync: false # Set this in the Render dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in the Render dashboard
      - key: FRONTEND_URL
        sync: false # Set this to your frontend URL (e.g. https://aialgocoach-frontend.onrender.com)
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure 256-bit string!

  # Frontend Static Site
  - type: web
    name: aialgocoach-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        # This automatically points to your Render backend instance once deployed
        value: https://aialgocoach-backend.onrender.com/api
    routes:
      # React Router Catch-All configuration for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html
