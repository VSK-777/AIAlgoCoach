services:
  # Backend Web Service (Docker)
  - type: web
    name: aialgocoach-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Neon PostgreSQL connection URL
      - key: DB_USERNAME
        sync: false # Neon PostgreSQL username
      - key: DB_PASSWORD
        sync: false # Neon PostgreSQL password
      - key: GROQ_API_KEY
        sync: false # Groq AI API key
      - key: FRONTEND_URL
        sync: false # Vercel frontend URL (e.g. https://aialgocoach.vercel.app)
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure 256-bit string
